<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>НейроБро</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                <span class="logo-text">НейроБро</span>
            </div>
            
            <div class="header-controls">
                <div id="energyDisplay" class="energy-badge" title="Пополнить Энергию">
                    ⚡ <span id="energyCount">...</span>
                    <span id="addEnergyIcon" class="add-icon">+</span>
                </div>
                
                <select id="personaSelector" class="modern-select persona-select">
                    <option value="default">🧠 Универсальный Бро</option>
                    <option value="tutor">👨‍🏫 Умный Репетитор</option>
                    <option value="lang_tutor">🇬🇧 Языковой Коуч</option>
                    <option value="fitness">🍏 ЗОЖ-Наставник</option>
                    <option value="coach">🧘‍♀️ Психолог-Коуч</option>
                    <option value="hr">💼 Карьерный HR</option>
                    <option value="business">📈 Бизнес-Стратег</option>
                    <option value="copywriter">✍️ Копирайтер</option>
                    <option value="coder">💻 IT-Сеньор</option>
                </select>
                
                <select id="modelSelector" class="modern-select">
                    <option value="gpt4o_mini">⚡ Быстрая</option>
                    <option value="gemini_flash">🧠 Думающая</option>
                    <option value="gemini_31_pro">🚀 Pro</option>
                </select>
                
                <button id="clearChatBtn" class="icon-btn" title="Очистить память">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
        </header>

        <div id="chat-box">
            <div class="message ai-message">
                Привет! Я твой НейроБро. Напиши мне свой вопрос или задачу. <br><br><i>Выбирай режим работы в шапке и погнали!</i>
            </div>
        </div>

        <div class="input-area">
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
            
            <button id="attachBtn" class="svg-action-btn" title="Прикрепить файл">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            
            <button id="micBtn" class="svg-action-btn" title="Голосовой ввод">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            
            <textarea id="userInput" placeholder="Спроси меня о чем угодно..." maxlength="2000"></textarea>
            
            <button id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <div id="tariffModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h2 class="modal-title">Пополнение Энергии ⚡</h2>
            <p class="modal-subtitle">Энергия расходуется на запросы к нейросети.</p>
            
            <div class="tariff-grid">
                <button class="tariff-card" data-amount="150">
                    <span class="t-price">150₽</span>
                    <span class="t-energy">1 500 ⚡</span>
                </button>
                <button class="tariff-card popular" data-amount="300">
                    <span class="t-badge">ХИТ</span>
                    <span class="t-price">300₽</span>
                    <span class="t-energy">3 200 ⚡</span>
                </button>
                <button class="tariff-card" data-amount="500">
                    <span class="t-price">500₽</span>
                    <span class="t-energy">5 500 ⚡</span>
                </button>
            </div>
            <p class="modal-footer-text">Оплата картой, SberPay или СБП.</p>
        </div>
    </div>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <script src="script.js?v=8"></script>
</body>
</html>
